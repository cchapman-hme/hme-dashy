---
# HME Dashboard (hme-dashy) — docker-compose
# To start: docker compose up -d
# To rebuild locally: docker compose up -d --build
version: "3.8"
services:
  dashy:
    container_name: Dashy

    # Pull the custom HME image from GitHub Container Registry
    image: ghcr.io/cchapman-hme/hme-dashy:latest

    # To build and run locally instead of pulling the GHCR image:
    # build: .

    # Pass in your config file
    # volumes:
      # - /path/to/my-config.yml:/app/user-data/conf.yml
      # - /path/to/item-icons:/app/user-data/item-icons/

    # Set port that web service will be served on. Keep container port as 8080
    ports:
      - 4000:8080

    environment:
      - NODE_ENV=production

      # ── Azure Entra ID SSO ──────────────────────────────────────────────────
      # Register an app at https://portal.azure.com → App registrations
      # Set Redirect URI to: https://<your-host>/auth/callback
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI}
      # Generate with: openssl rand -hex 32
      - SESSION_SECRET=${SESSION_SECRET}
      # Optional: restrict to specific Azure AD group OIDs (comma-separated)
      # - ALLOWED_GROUPS=${ALLOWED_GROUPS}
      # Optional: emails with admin access (comma-separated)
      # - ADMIN_EMAILS=${ADMIN_EMAILS}
      # ──────────────────────────────────────────────────────────────

    # Persist the SQLite session database across restarts
    volumes:
      - dashy-sessions:/app/data

    restart: unless-stopped

    healthcheck:
      test: ['CMD', 'node', '/app/services/healthcheck']
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  dashy-sessions:

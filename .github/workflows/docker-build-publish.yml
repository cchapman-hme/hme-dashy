name: Build + Publish Image to GHCR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags: ['*.*.*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write
  contents: read

env:
  GH_IMAGE: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }

    steps:
    - name: 🛎️ Checkout Repo
      uses: actions/checkout@v4

    - name: 🗂️ Make Docker Meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ env.GH_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}.x
          type=sha,prefix=sha-
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
        flavor: |
          latest=false
        labels: |
          maintainer=cchapman-hme
          org.opencontainers.image.title=HME Dashboard
          org.opencontainers.image.description=HME internal dashboard (Dashy + Azure Entra ID SSO)
          org.opencontainers.image.authors=HM Electronics

    - name: 🔧 Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/amd64,linux/arm64

    - name: 🔧 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔑 Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: ⚒️ Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
